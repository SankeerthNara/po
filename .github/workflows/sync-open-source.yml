name: Sync open source contributions

on:
  schedule:
    - cron: "0 * * * *" # every hour, on the hour (UTC)
  workflow_dispatch: {} # allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/sync-open-source.mjs

      - name: Open PR if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync open source contributions"
          title: "chore: sync open source contributions"
          body: |
            Auto-generated by `scripts/sync-open-source.mjs`.

            Any new PR not yet in `scripts/open-source-config.json` overrides
            will show up here with its raw GitHub title — check the workflow
            log, add a polished description to `overrides`, and re-run if needed.
          branch: sync-open-source
          delete-branch: true
